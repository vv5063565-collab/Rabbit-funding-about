<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Funding</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --btn-color:#7AC943;
            --text-gray:#4b5563;
            --gray-500:#6b7280;
            --gray-100:#f3f4f6;
            --gray-800:#1f2937;

          }    
.nav-menu {
    display: flex;
}

.nav-menu a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
}
          
.menu-icon {
    display: none;
}


@media (max-width: 767.98px) {

    .menu-icon {
        display: flex;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        width: 23px;
        z-index: 0;
        
    }

    .menu-icon span {
        width: 100%;
        height: 3px;
        background: #333;
        border-radius: 5px;
        
        transform-origin: left;
    }
    .nav-menu a{
    margin: 0;
    }
    .nav-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100vh;
        background: #fff;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
        transition: all 0.3s ease;
    }
    /*Cross*/
    .menu-icon.active span:nth-child(1){
        transform: rotate(45deg);
    }
    .menu-icon.active span:nth-child(2){
        opacity: 0;
    }
    .menu-icon.active span:nth-child(3){
        transform: rotate(-45deg);
    }

    .nav-menu.show {
        right: 0;
    }

    
}

    </style>
</head>
